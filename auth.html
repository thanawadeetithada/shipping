<script>
    document.addEventListener('DOMContentLoaded', function() {
        const sessionData = sessionStorage.getItem("userSession");
        const navActionContainer = document.getElementById('navActionContainer');
        const loginNavBtn = document.getElementById('loginNavBtn');
        const baseUrl = typeof GLOBAL_SCRIPT_URL !== 'undefined' ? GLOBAL_SCRIPT_URL : "";

        if (sessionData) {
            if (loginNavBtn) {
                loginNavBtn.classList.add('hidden');
            }
            
            const user = JSON.parse(sessionData);

            if (baseUrl) {
                renderProfileNav(baseUrl, user, navActionContainer);
            } else {
                google.script.run.withSuccessHandler(function(url) {
                    renderProfileNav(url, user, navActionContainer);
                }).getScriptUrl();
            }
        }
    });

    function renderProfileNav(url, user, container) {
        const userProfileHTML = `
            <div class="flex items-center gap-4 text-sm font-medium">
                <a href="${url}?page=userprofile" target="_top" class="text-gray-800 hover:text-brand transition cursor-pointer">
                    <i class="fas fa-user-circle text-brand mr-1 text-lg"></i> คุณ ${user.fullname}
                </a>
                <button type="button" onclick="logout()" class="bg-brand text-white px-4 py-2 rounded-md text-sm font-medium hover:bg-red-700 transition shadow-sm">
                    ออกจากระบบ
                </button>
            </div>
        `;
        if (container) {
            container.insertAdjacentHTML('beforeend', userProfileHTML);
        }
    }
</script>
