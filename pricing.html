    <script>
        <? var scriptUrl = getScriptUrl(); ?>
        const GLOBAL_SCRIPT_URL = "<?= scriptUrl ?>";

        // ทำงานเมื่อโหลดหน้าเว็บเสร็จ
        document.addEventListener('DOMContentLoaded', function () {
            // เช็คว่าเคย Login ไว้หรือไม่ ถ้ามีให้เปลี่ยนปุ่มเป็น "ไปที่แดชบอร์ด"
            const sessionData = localStorage.getItem('userSession');
            if (sessionData) {
                const loginBtn = document.getElementById('loginNavBtn');
                if (loginBtn) {
                    loginBtn.innerText = "แดชบอร์ดของฉัน";
                    loginBtn.onclick = function() { window.top.location.href = GLOBAL_SCRIPT_URL + '?page=user_dashboard'; };
                }
            }

            fetchContactFooter();
            fetchPricingData();
        });

        function fetchPricingData() {
            document.getElementById('loadingOverlay').classList.remove('hidden');

            google.script.run
                .withSuccessHandler(function (response) {
                    document.getElementById('loadingOverlay').classList.add('hidden');
                    if (response.success) {
                        renderPricing(response.data);
                    } else {
                        alert("ข้อผิดพลาดจากเซิร์ฟเวอร์: " + response.message);
                    }
                })
                .withFailureHandler(function (err) {
                    document.getElementById('loadingOverlay').classList.add('hidden');
                    alert("เกิดข้อผิดพลาดในการเชื่อมต่อ: " + err.message);
                })
                .getPricingData(); // เรียกใช้ BE ตัวเดียวกับของฝั่ง User
        }

        function fetchContactFooter() {
            google.script.run
                .withSuccessHandler(function (res) {
                    if (res.success) {
                        document.getElementById('footer-phone').innerText = res.phone;
                        document.getElementById('footer-line').innerText = res.line;
                        document.getElementById('footer-line-link').href = res.lineLink;
                        document.getElementById('footer-email').innerText = res.email;
                    }
                })
                .withFailureHandler(function (err) {
                    console.error("Error fetching contact data:", err);
                    document.getElementById('footer-phone').innerText = "02-114-8008";
                    document.getElementById('footer-line').innerText = "@sucharcargo";
                    document.getElementById('footer-email').innerText = "support@sucharcargo.com";
                })
                .getContactData();
        }

        function renderPricing(pricingArray) {
            const container = document.getElementById('pricing-container');
            container.innerHTML = '';

            if(!pricingArray || pricingArray.length === 0) {
                container.innerHTML = `<div class="col-span-2 text-center text-gray-500 py-10">ยังไม่มีข้อมูลอัตราค่าขนส่งในระบบ</div>`;
                return;
            }

            pricingArray.forEach(method => {
                // จัดการเรื่องสไตล์ (สี) ให้สอดคล้องกับประเภทการส่ง (เรือ หรือ รถ)
                let headerBgClass = "bg-gray-800";
                let iconClass = "fa-truck text-red-400";
                let subTextClass = "text-gray-300";
                let priceKgColor = "text-brand";

                // ถ้าชื่อมีคำว่า 'เรือ' หรือ 'SEA' ให้เปลี่ยนการ์ดเป็นสีฟ้า
                if (method.type.includes("เรือ") || method.type.includes("SEA")) {
                    headerBgClass = "bg-blue-800";
                    iconClass = "fa-ship text-blue-300";
                    subTextClass = "text-blue-200";
                    priceKgColor = "text-blue-600";
                }

                // สร้างเนื้อหาของตาราง (ข้อมูลประเภทสินค้าและราคา)
                let tableRowsHtml = method.items.map(item => `
                    <tr>
                        <td class="py-4 px-4 font-medium">${item.name}</td>
                        <td class="py-4 px-4 text-right font-bold ${priceKgColor}">${item.kg} ฿</td>
                        <td class="py-4 px-4 text-right text-gray-600">${item.cbm} ฿</td>
                    </tr>
                `).join('');

                // สร้างโครงสร้างการ์ด HTML ของหมวดหมู่นั้นๆ
                let cardHtml = `
                <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100 hover:shadow-lg transition-shadow">
                    <div class="${headerBgClass} text-white p-6 text-center">
                        <i class="fa-solid ${iconClass} text-4xl mb-3"></i>
                        <h3 class="text-xl font-bold">${method.type}</h3>
                        <p class="text-sm ${subTextClass} mt-1">ใช้เวลา ${method.time} วันทำการ</p>
                    </div>
                    <div class="p-6">
                        <table class="w-full text-sm text-left">
                            <thead class="bg-gray-50 text-gray-600 font-medium">
                                <tr>
                                    <th class="py-3 px-4 rounded-tl-lg">ประเภทสินค้า</th>
                                    <th class="py-3 px-4 text-right">ราคา / KG</th>
                                    <th class="py-3 px-4 text-right rounded-tr-lg">ราคา / CBM</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100">
                                ${tableRowsHtml}
                            </tbody>
                        </table>
                    </div>
                </div>`;

                // แทรกลงใน Container หลัก
                container.innerHTML += cardHtml;
            });
        }
    </script>
