<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรไฟล์ของฉัน - SUCHAR CARGO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8f9fa; }
        .bg-brand { background-color: #c51c24; }
        .text-brand { color: #c51c24; }
        .bg-brand-dark { background-color: #8b1319; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-gray-800">

    <div id="loadingOverlay" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-center justify-center backdrop-blur-sm transition-opacity">
        <div class="bg-white p-8 rounded-2xl shadow-2xl flex flex-col items-center text-center max-w-sm w-full mx-4 transform scale-100 transition-transform">
            <i id="loadingIcon" class="fas fa-circle-notch fa-spin text-brand text-6xl mb-4"></i>
            <h3 class="text-xl font-bold text-gray-800 mb-2">กรุณารอสักครู่</h3>
            <p id="loadingText" class="text-gray-500 text-sm">กำลังดำเนินการ...</p>
        </div>
    </div>

    <div id="sidebarBackdrop" class="fixed inset-0 bg-black/50 z-40 hidden transition-opacity duration-300 md:hidden" onclick="toggleMobileSidebar()"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-gray-900 text-white flex flex-col z-50 transform -translate-x-full transition-transform duration-300 md:relative md:translate-x-0 md:flex shadow-xl">
        <div class="py-6 px-6 bg-brand-dark flex flex-col items-center justify-center relative border-b border-red-900">
            <div class="text-2xl font-bold leading-none mb-1 tracking-wide">SUCHAR</div>
            <div class="text-[10px] tracking-widest text-red-200 bg-black/20 px-2 py-0.5 rounded-full mt-1">CUSTOMER PORTAL</div>
            <button class="absolute top-6 right-4 text-white md:hidden hover:text-red-200" onclick="toggleMobileSidebar()"><i class="fas fa-times text-xl"></i></button>
        </div>

        <nav class="flex-grow p-4 space-y-1.5 overflow-y-auto text-sm">
            <a href="user_dashboard.html" class="flex items-center gap-3 text-gray-400 hover:text-white hover:bg-gray-800 px-4 py-3 rounded-md font-medium transition duration-200">
                <i class="fas fa-home w-5 text-center"></i> แดชบอร์ดของฉัน
            </a>
             <a href="user_import.html" class="flex items-center gap-3 text-gray-400 hover:text-white hover:bg-gray-800 px-4 py-3 rounded-md font-medium transition duration-200">
                <i class="fas fa-box-open w-5 text-center"></i> แจ้งนำเข้าสินค้า
            </a>
            <a href="user_tracking.html" class="flex items-center gap-3 text-gray-400 hover:text-white hover:bg-gray-800 px-4 py-3 rounded-md font-medium transition duration-200">
                <i class="fas fa-box-open w-5 text-center"></i> สถานะพัสดุทั้งหมด
            </a>
            <a href="user_payment.html" class="flex items-center gap-3 text-gray-400 hover:text-white hover:bg-gray-800 px-4 py-3 rounded-md font-medium transition duration-200">
                <i class="fas fa-file-invoice-dollar w-5 text-center"></i> จัดส่งสินค้า
            </a>
        </nav>
        <div class="p-4 bg-gray-950">
            <button onclick="window.location.href='index.html'" class="flex items-center justify-center gap-2 text-gray-400 hover:text-white hover:bg-red-600/80 w-full px-4 py-2.5 rounded-md border border-gray-800 transition text-sm font-medium"><i class="fas fa-sign-out-alt"></i> ออกจากระบบ</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="bg-white shadow-sm py-4 px-6 flex justify-between items-center z-30">
            <div class="flex items-center gap-4 flex-1">
                <button class="text-gray-600 hover:text-brand md:hidden p-1 transition" onclick="toggleMobileSidebar()"><i class="fas fa-bars text-xl"></i></button>
            </div>
            <div class="hidden md:flex flex-1 justify-center space-x-6 text-sm font-medium">
                <a href="user_main.html" class="text-gray-600 hover:text-brand transition">หน้าหลัก</a>
                <a href="user_pricing.html" class="text-gray-600 hover:text-brand transition">อัตราค่าขนส่ง</a>
            </div>
            <div class="flex items-center justify-end flex-1">
                <div class="flex items-center gap-3 bg-gray-50 px-3 py-1.5 rounded-full border border-gray-100 cursor-pointer">
                    <img src="https://ui-avatars.com/api/?name=Somchai+J&background=c51c24&color=fff" class="w-8 h-8 rounded-full shadow-sm">
                    <span class="text-sm font-medium text-gray-700 pr-2 hidden sm:block">ทดสอบ เว็บไซต์</span>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-4 md:p-8">
            <div class="max-w-3xl mx-auto space-y-6">
                
                <div class="border-b border-gray-200 pb-4">
                    <h1 class="text-2xl font-bold text-gray-800"><i class="fas fa-user-edit text-brand mr-2"></i> ข้อมูลส่วนตัว</h1>
                    <p class="text-sm text-gray-500 mt-1">จัดการข้อมูลการติดต่อ และที่อยู่สำหรับจัดส่งพัสดุในไทย</p>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="p-6 md:p-8">
                        <form id="profileForm" onsubmit="handleUpdateProfile(event)">
                            <div id="statusMsg" class="hidden text-sm font-medium text-center p-3 mb-6 border rounded-lg"></div>

                            <div class="space-y-5">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">รหัสสมาชิก</label>
                                    <div class="relative">
                                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                            <i class="fas fa-id-card text-gray-400"></i>
                                        </div>
                                        <input type="text" id="profile_memberId" disabled class="w-full pl-12 pr-4 py-2.5 bg-gray-100 border border-gray-200 rounded-lg text-sm text-gray-500 font-bold cursor-not-allowed">
                                    </div>
                                </div>

                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">ชื่อ-นามสกุล <span class="text-red-500">*</span></label>
                                    <div class="relative">
                                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                            <i class="fas fa-user text-gray-400"></i>
                                        </div>
                                        <input type="text" id="profile_fullname" required class="w-full pl-12 pr-4 py-2.5 bg-white border border-gray-300 rounded-lg focus:outline-none focus:ring-1 focus:ring-brand focus:border-brand transition-colors text-sm text-gray-700" autocomplete="off">
                                    </div>
                                </div>

                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">เบอร์โทรศัพท์ <span class="text-red-500">*</span></label>
                                    <div class="relative">
                                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                            <i class="fas fa-phone text-gray-400"></i>
                                        </div>
                                        <input type="tel" id="profile_phone" required class="w-full pl-12 pr-4 py-2.5 bg-white border border-gray-300 rounded-lg focus:outline-none focus:ring-1 focus:ring-brand focus:border-brand transition-colors text-sm text-gray-700" autocomplete="off">
                                    </div>
                                </div>

                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">ที่อยู่สำหรับจัดส่งสินค้า</label>
                                    <textarea id="profile_address" rows="3" class="w-full pl-4 pr-4 py-2.5 bg-white border border-gray-300 rounded-lg focus:outline-none focus:ring-1 focus:ring-brand focus:border-brand transition-colors text-sm text-gray-700"></textarea>
                                </div>

                                <div class="border-t border-gray-100 pt-5 mt-5">
                                    <label class="block text-sm font-bold text-gray-800 mb-3"><i class="fas fa-key text-gray-400 mr-2"></i> เปลี่ยนรหัสผ่าน <span class="text-xs font-normal text-gray-500">(เว้นว่างไว้หากไม่ต้องการเปลี่ยน)</span></label>
                                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        <div class="relative">
                                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                                <i class="fas fa-lock text-gray-400"></i>
                                            </div>
                                            <input type="password" id="profile_password" class="w-full pl-12 pr-4 py-2.5 bg-white border border-gray-300 rounded-lg focus:outline-none focus:ring-1 focus:ring-brand focus:border-brand transition-colors text-sm text-gray-700" placeholder="รหัสผ่านใหม่">
                                            <div class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer" onclick="togglePassword('profile_password', 'eye-profile-pass')">
                                                <i id="eye-profile-pass" class="fas fa-eye text-gray-400 hover:text-gray-600 transition"></i>
                                            </div>
                                        </div>
                                        <div class="relative">
                                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                                <i class="fas fa-lock text-gray-400"></i>
                                            </div>
                                            <input type="password" id="profile_confirm_password" class="w-full pl-12 pr-4 py-2.5 bg-white border border-gray-300 rounded-lg focus:outline-none focus:ring-1 focus:ring-brand focus:border-brand transition-colors text-sm text-gray-700" placeholder="ยืนยันรหัสผ่านใหม่">
                                            <div class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer" onclick="togglePassword('profile_confirm_password', 'eye-profile-confirm')">
                                                <i id="eye-profile-confirm" class="fas fa-eye text-gray-400 hover:text-gray-600 transition"></i>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="mt-8 flex gap-3">
                                <button type="button" onclick="window.location.href='user_dashboard.html'" class="flex-1 bg-white border border-gray-300 text-gray-700 font-medium py-3 px-4 rounded-lg hover:bg-gray-50 transition">
                                    ยกเลิก
                                </button>
                                <button type="submit" id="updateBtn" class="flex-[2] bg-brand text-white font-bold py-3 px-4 rounded-lg hover:bg-brand-dark transition flex items-center justify-center gap-2 shadow-md">
                                    <i class="fas fa-save"></i> <span>บันทึกการแก้ไข</span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        // ควบคุมเมนูมือถือ
        function toggleMobileSidebar() {
            const sidebar = document.getElementById('sidebar');
            const backdrop = document.getElementById('sidebarBackdrop');
            sidebar.classList.toggle('-translate-x-full');
            backdrop.classList.toggle('hidden');
        }

        // Mock Data เมื่อโหลดหน้าเว็บ
        document.addEventListener('DOMContentLoaded', function() {
            // จำลองข้อมูลผู้ใช้
            const mockUser = {
                memberId: "SC-8890",
                fullname: "ทดสอบ เว็บไซต์",
                phone: "081-234-5678",
                address: "123/456 หมู่บ้านตัวอย่าง ถ.รามอินทรา แขวงบางเขน เขตบางเขน กรุงเทพฯ 10220"
            };

            document.getElementById('profile_memberId').value = mockUser.memberId;
            document.getElementById('profile_fullname').value = mockUser.fullname;
            document.getElementById('profile_phone').value = mockUser.phone;
            document.getElementById('profile_address').value = mockUser.address;
        });

        // ฟังก์ชันเปิด-ปิดตารหัสผ่าน
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            }
        }

        // ฟังก์ชันจัดการการบันทึกข้อมูล (Mock Loading)
        function handleUpdateProfile(e) {
            e.preventDefault();

            const password = document.getElementById('profile_password').value;
            const confirmPassword = document.getElementById('profile_confirm_password').value;
            const statusMsg = document.getElementById('statusMsg');
            const loadingOverlay = document.getElementById('loadingOverlay');
            const loadingText = document.getElementById('loadingText');
            const loadingIcon = document.getElementById('loadingIcon');

            // ตรวจสอบรหัสผ่านว่าตรงกันหรือไม่
            if (password !== "" || confirmPassword !== "") {
                if (password !== confirmPassword) {
                    statusMsg.classList.remove('hidden', 'border-green-200', 'bg-green-50', 'text-green-600');
                    statusMsg.classList.add('border-red-200', 'bg-red-50', 'text-red-500');
                    statusMsg.innerHTML = '<i class="fas fa-exclamation-circle mr-1"></i> รหัสผ่านใหม่และยืนยันรหัสผ่านไม่ตรงกัน';
                    return;
                }
            }

            // ซ่อนข้อความ Error
            statusMsg.classList.add('hidden');
            
            // เปิดหน้าต่าง Loading
            loadingOverlay.classList.remove('hidden');
            loadingIcon.className = "fas fa-circle-notch fa-spin text-brand text-6xl mb-4"; 
            loadingText.innerText = "กำลังตรวจสอบและบันทึกข้อมูล...";

            // จำลองการโหลดข้อมูล 1.5 วินาที
            setTimeout(() => {
                // เปลี่ยนไอคอนและข้อความเมื่อสำเร็จ
                loadingIcon.className = "fas fa-check-circle text-green-500 text-6xl mb-4";
                loadingText.innerText = "บันทึกข้อมูลสำเร็จ! กำลังกลับไปหน้าแดชบอร์ด...";
                
                // จำลองการเปลี่ยนหน้า
                setTimeout(() => {
                    window.location.href = "user_dashboard.html";
                }, 1000);

            }, 1500);
        }
    </script>
</body>
</html>
