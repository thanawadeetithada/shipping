    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const sessionData = localStorage.getItem('userSession');

            if (sessionData) {
                try {
                    const user = JSON.parse(sessionData);
                    
                    if (document.getElementById('profile_memberId')) document.getElementById('profile_memberId').value = user.memberId || '';
                    if (document.getElementById('profile_fullname')) document.getElementById('profile_fullname').value = user.fullname || user.name || '';
                    if (document.getElementById('profile_phone')) document.getElementById('profile_phone').value = user.phone || '';
                    if (document.getElementById('profile_address')) document.getElementById('profile_address').value = user.address || '';

                    const fullname = user.fullname || user.name || "ไม่ระบุชื่อ";
                    const usernameElement = document.getElementById('headerUsername');
                    if (usernameElement) {
                        usernameElement.innerText = fullname;
                    }
                    
                    const avatarElement = document.getElementById('headerAvatar');
                    if (avatarElement) {
                        avatarElement.src = "https://ui-avatars.com/api/?name=" + encodeURIComponent(fullname) + "&background=fff&color=c51c24";
                    }
                } catch (e) {
                    console.error("รูปแบบข้อมูลเซสชันไม่ถูกต้อง:", e);
                }
            }
        });

        function toggleSpinner(show, message = "กำลังบันทึกข้อมูล...") {
            const overlay = document.getElementById('loadingOverlay');
            const loadingText = document.getElementById('loadingText');
            
            if (show) {
                loadingText.innerText = message;
                overlay.classList.remove('hidden');
                overlay.classList.add('flex'); 
            } else {
                overlay.classList.add('hidden');
                overlay.classList.remove('flex');
            }
        }

        function handleUpdateProfile(event) {
            event.preventDefault();
            
            const memberId = document.getElementById('profile_memberId').value;
            const fullname = document.getElementById('profile_fullname').value.trim();
            const phone = document.getElementById('profile_phone').value.trim();
            const address = document.getElementById('profile_address').value.trim();
            const password = document.getElementById('profile_password').value;
            const confirmPassword = document.getElementById('profile_confirm_password').value;
            
            const statusMsg = document.getElementById('statusMsg');
            
            statusMsg.classList.add('hidden');
            
            if (password || confirmPassword) {
                if (password !== confirmPassword) {
                    showStatus("รหัสผ่านใหม่และยืนยันรหัสผ่านไม่ตรงกัน", false);
                    return;
                }
            }
            
            toggleSpinner(true, "กำลังตรวจสอบและบันทึกข้อมูล...");
            
            const userData = {
                memberId: memberId,
                fullname: fullname,
                phone: phone,
                address: address,
                password: password || null
            };
            
            google.script.run
                .withSuccessHandler(function(response) {
                    toggleSpinner(false);
                    
                    if (response.success) {
                        showStatus(response.message, true);
                        
                        const currentSession = JSON.parse(localStorage.getItem('userSession'));
                        currentSession.fullname = fullname;
                        currentSession.phone = phone;
                        currentSession.address = address;
                        localStorage.setItem('userSession', JSON.stringify(currentSession));
                        
                        if (document.getElementById('headerUsername')) document.getElementById('headerUsername').innerText = fullname;
                        if (document.getElementById('headerAvatar')) document.getElementById('headerAvatar').src = "https://ui-avatars.com/api/?name=" + encodeURIComponent(fullname) + "&background=fff&color=c51c24";
                        
                        document.getElementById('profile_password').value = '';
                        document.getElementById('profile_confirm_password').value = '';
                    } else {
                        showStatus(response.message, false);
                    }
                })
                .withFailureHandler(function(error) {
                    toggleSpinner(false);
                    showStatus("เกิดข้อผิดพลาดจากระบบเซิร์ฟเวอร์: " + error.message, false);
                })
                .updateUserProfile(userData);
        }

        function showStatus(msg, isSuccess) {
            const statusMsg = document.getElementById('statusMsg');
            statusMsg.innerText = msg;
            statusMsg.classList.remove('hidden', 'bg-green-50', 'text-green-700', 'border-green-200', 'bg-red-50', 'text-red-700', 'border-red-200');
            
            if (isSuccess) {
                statusMsg.classList.add('bg-green-50', 'text-green-700', 'border-green-200');
            } else {
                statusMsg.classList.add('bg-red-50', 'text-red-700', 'border-red-200');
            }
        }

        function togglePassword(inputId, eyeId) {
            const input = document.getElementById(inputId);
            const eye = document.getElementById(eyeId);
            if (input.type === 'password') {
                input.type = 'text';
                eye.classList.remove('fa-eye');
                eye.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                eye.classList.remove('fa-eye-slash');
                eye.classList.add('fa-eye');
            }
        }

        function toggleMobileSidebar() {
            const sidebar = document.getElementById('sidebar');
            const backdrop = document.getElementById('sidebarBackdrop');
            sidebar.classList.toggle('-translate-x-full');
            backdrop.classList.toggle('hidden');
        }

        function logoutuser() {
            localStorage.removeItem('userSession');
            localStorage.clear();
            window.top.location.href = '<?= getScriptUrl() ?>?page=index';
        }
    </script>
