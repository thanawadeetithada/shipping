<body class="min-h-screen flex items-center justify-center p-4 py-10 relative">

    <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg overflow-hidden">

                        <div class="relative">

                                    class="fas fa-user text-gray-400"></i></div>
                            <input type="text" id="fullname" required
                                class="w-full pl-12 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500 focus:bg-white transition-colors text-s text-gray-700"

                        </div>
                    </div>

                        <div class="relative">

                                    class="fas fa-phone text-gray-400"></i></div>
                            <input type="tel" id="phone" required
                                class="w-full pl-12 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500 focus:bg-white transition-colors text-s text-gray-700"

                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                    <i class="fas fa-lock text-gray-400"></i>
                                </div>
                                <input type="password" id="password" required
                                    class="w-full pl-12 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500 focus:bg-white transition-colors text-s text-gray-700"
                                    placeholder="รหัสผ่าน">
                                <div class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer"
                                    onclick="togglePassword('password', 'eye-icon-pass')">
                                    <i id="eye-icon-pass" class="fas fa-eye text-gray-400 hover:text-gray-600"></i>
                                </div>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">ยืนยันรหัสผ่าน <span
                                    class="text-red-500">*</span></label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                    <i class="fas fa-lock text-gray-400"></i>
                                </div>
                                <input type="password" id="confirm_password" required

                        <textarea id="address" rows="3"

    <script>
        // ฟังก์ชันเปิด/ปิดรหัสผ่าน
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);

            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            }
        }

        function handleRegister(e) {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            const statusMsg = document.getElementById('statusMsg');
            const loadingOverlay = document.getElementById('loadingOverlay');
            const loadingText = document.getElementById('loadingText');
            const loadingIcon = document.getElementById('loadingIcon');

            // ตรวจสอบรหัสผ่านว่าตรงกันหรือไม่
            if (password !== confirmPassword) {
                statusMsg.classList.remove('hidden', 'text-green-600');
                statusMsg.classList.add('text-red-500');
                statusMsg.innerText = "รหัสผ่านไม่ตรงกัน";
                return;
            }

            const data = {
                fullname: document.getElementById('fullname').value,
                phone: document.getElementById('phone').value,
                password: password,
                address: document.getElementById('address').value
            };

            // ซ่อนข้อความแจ้งเตือนเดิมและแสดง Loading เต็มจอ
            statusMsg.classList.add('hidden');
            loadingOverlay.classList.remove('hidden');
            loadingIcon.className = "fas fa-circle-notch fa-spin text-6xl mb-4"; // คืนค่า icon ให้หมุนเผื่อมีการโหลดซ้ำ
            loadingText.innerText = "กำลังบันทึกข้อมูล...";

            // เรียก App Script ฝั่ง Server
            google.script.run
                .withSuccessHandler(function (response) {
                    if (response.success) {
                        // เปลี่ยน Icon โหลดเป็นเครื่องหมายติ๊กถูก
                        loadingIcon.className = "fas fa-check-circle text-green-400 text-6xl mb-4";
                        loadingText.innerText = "สมัครสมาชิกสำเร็จ!";

                        // หน่วงเวลา 1 วินาทีให้เห็นเครื่องหมายถูก แล้วรีไดเร็คไปหน้า index
                        setTimeout(() => {
                            window.top.location.href = "<?= url ?>?page=index";
                        }, 1000);

                    } else {
                        // หากมี Error ให้ซ่อนหน้าต่างโหลด แล้วกลับมาโชว์ข้อความ Error
                        loadingOverlay.classList.add('hidden');
                        statusMsg.classList.remove('hidden', 'text-green-600');
                        statusMsg.classList.add('text-red-500');
                        statusMsg.innerText = response.message;
                    }
                })
                .registerNewUser(data);
        }
    </script>
</body>
