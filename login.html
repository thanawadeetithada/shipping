    <script>
        let redirectTimeout;

        function switchPage(pageId) {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('loginSection').classList.remove('block');
            document.getElementById('registerSection').classList.add('hidden');
            document.getElementById('registerSection').classList.remove('block');

            document.getElementById(pageId).classList.remove('hidden');
            document.getElementById(pageId).classList.add('block');

            document.getElementById('errorMsg').classList.add('hidden');
            document.getElementById('statusMsg').classList.add('hidden');
        }

        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);

            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = "password";
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        function showError(elementId, message) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.classList.remove('hidden');
            el.classList.add('text-red-500', 'bg-red-50', 'border-red-200');
        }

        function showSpinner(text) {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) {
                document.getElementById('loadingText').innerText = text;
                overlay.classList.remove('hidden');
            }
        }

        function hideSpinner() {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) {
                overlay.classList.add('hidden');
            }
        }

        function showSuccessModal(memberId) {
            const modal = document.getElementById('successModalOverlay');
            const msgEl = document.getElementById('successModalMsg');
            msgEl.innerHTML = `ระบบจะพาไปหน้าเข้าสู่ระบบใน 3 วินาที`;
            modal.classList.remove('hidden');
            redirectTimeout = setTimeout(() => {
                goToLoginFromModal();
            }, 3000);
        }

        function goToLoginFromModal() {
            clearTimeout(redirectTimeout);
            document.getElementById('successModalOverlay').classList.add('hidden');
            switchPage('loginSection');
        }

        function handleLogin(event) {
            event.preventDefault();
            const phone = document.getElementById('phone_login').value.trim();
            const pass = document.getElementById('password_login').value.trim();

            document.getElementById('errorMsg').classList.add('hidden');
            showSpinner('กำลังตรวจสอบข้อมูล...');

            google.script.run
                .withSuccessHandler(function (response) {
                    if (response.success) {
                        showSpinner('เข้าสู่ระบบสำเร็จ!');
                        localStorage.setItem('userSession', JSON.stringify(response.user));
                        setTimeout(() => {
                            window.top.location.href = "<?= getScriptUrl() ?>?page=" + response.redirectPage;
                        }, 1000);
                    } else {
                        hideSpinner();
                        showError('errorMsg', response.message);
                    }
                })
                .withFailureHandler(function (error) {
                    hideSpinner();
                    showError('errorMsg', 'เชื่อมต่อเซิร์ฟเวอร์ล้มเหลว');
                })
                .verifyLogin(phone, pass);
        }

        function handleRegister(event) {
            event.preventDefault();

            const fullname = document.getElementById('fullname_reg').value.trim();
            const phone = document.getElementById('phone_reg').value.trim();
            const pass = document.getElementById('password_reg').value;
            const confirmPass = document.getElementById('confirm_password_reg').value;
            const address = document.getElementById('address_reg').value.trim();

            document.getElementById('statusMsg').classList.add('hidden');

            if (pass !== confirmPass) {
                showError('statusMsg', 'รหัสผ่านและการยืนยันรหัสผ่านไม่ตรงกัน');
                return;
            }

            showSpinner('กำลังบันทึกข้อมูล...');

            const data = {
                fullname: fullname,
                phone: phone,
                password: pass,
                address: address
            };

            google.script.run
                .withSuccessHandler(function (response) {
                    if (response.success) {
                        hideSpinner();
                        document.getElementById('registerForm').reset();

                        showSuccessModal(response.memberId);

                    } else {
                        hideSpinner();
                        showError('statusMsg', response.message);
                    }
                })
                .withFailureHandler(function (error) {
                    hideSpinner();
                    showError('statusMsg', 'เชื่อมต่อเซิร์ฟเวอร์ล้มเหลว');
                })
                .registerNewUser(data);
        }
    </script>
