<div id="profileLoadingOverlay" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-center justify-center backdrop-blur-sm transition-opacity">
    <div class="bg-white p-8 rounded-2xl shadow-2xl flex flex-col items-center text-center max-w-sm w-full mx-4">
        <i class="fas fa-circle-notch fa-spin text-brand text-6xl mb-4" style="animation-duration: 0.8s;"></i>
        <h3 id="profileLoadingTitle" class="text-xl font-bold text-gray-800 mb-2">กำลังบันทึกข้อมูล</h3>
        <p id="profileLoadingText" class="text-gray-500 text-sm">กรุณารอสักครู่...</p>
    </div>
</div>

<div id="profileModalOverlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4 transition-opacity duration-300">
    <div id="pModalBox" class="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden transform transition-all text-center p-8 border-t-4 border-green-500">
        
        <div id="pModalIconWrap" class="w-20 h-20 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-5 shadow-inner">
            <i id="pModalIcon" class="fas fa-check text-4xl text-green-500"></i>
        </div>
        
        <h3 id="pModalTitle" class="text-2xl font-bold text-gray-800 mb-2">สำเร็จ!</h3>
        <p id="pModalMsg" class="text-gray-600 mb-6 text-sm"></p>
        
        <button onclick="closeProfileModal()" class="w-full bg-brand text-white font-bold py-3 px-4 rounded-xl hover:bg-brand-dark transition-colors shadow-md flex justify-center items-center gap-2">
            <span>ตกลง</span>
        </button>
    </div>
</div>

<script>
    // ฟังก์ชันจัดการ Loading
    function showLoading(title = 'กำลังบันทึกข้อมูล', text = 'กรุณารอสักครู่...') {
        document.getElementById('profileLoadingTitle').innerText = title;
        document.getElementById('profileLoadingText').innerText = text;
        document.getElementById('profileLoadingOverlay').classList.remove('hidden');
    }

    function hideLoading() {
        document.getElementById('profileLoadingOverlay').classList.add('hidden');
    }

    // ฟังก์ชันจัดการ Modal สรุปผล
    function showProfileModal(isSuccess, title, message) {
        hideLoading(); // ปิด Loading ก่อนโชว์ Modal
        
        document.getElementById('pModalTitle').innerText = title;
        document.getElementById('pModalMsg').innerText = message;
        
        const box = document.getElementById('pModalBox');
        const iconWrap = document.getElementById('pModalIconWrap');
        const icon = document.getElementById('pModalIcon');

        if(isSuccess) {
            box.className = "bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden transform transition-all text-center p-8 border-t-4 border-green-500";
            iconWrap.className = "w-20 h-20 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-5 shadow-inner";
            icon.className = "fas fa-check text-4xl text-green-500";
        } else {
            box.className = "bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden transform transition-all text-center p-8 border-t-4 border-red-500";
            iconWrap.className = "w-20 h-20 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-5 shadow-inner";
            icon.className = "fas fa-times text-4xl text-red-500";
        }

        document.getElementById('profileModalOverlay').classList.remove('hidden');
    }

    // ฟังก์ชันปิด Modal
    function closeProfileModal() {
        document.getElementById('profileModalOverlay').classList.add('hidden');
        
        // เช็คว่าถ้าเป็นกรอบสีเขียว (อัปเดตสำเร็จ) ให้รีเฟรชหน้าไปที่ Dashboard
        if(document.getElementById('pModalBox').classList.contains('border-green-500')){
            window.top.location.href = '<?= getScriptUrl() ?>?page=user_dashboard';
        }
    }
</script>
