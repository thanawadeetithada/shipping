<div id="loadingOverlay" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-[70] hidden flex flex-col items-center justify-center transition-opacity duration-300">
    <i class="fas fa-circle-notch fa-spin text-brand text-5xl mb-4"></i>
    <p class="text-gray-800 font-medium text-lg">กำลังประมวลผลข้อมูล...</p>
</div>

<div id="successModalOverlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[60] hidden flex items-center justify-center p-4 transition-opacity duration-300">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden transform transition-all text-center p-8 border-t-4 border-green-500">
        <div class="w-16 h-16 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner">
            <i class="fas fa-check text-3xl text-green-500"></i>
        </div>
        <h3 id="successModalTitle" class="text-xl font-bold text-gray-800 mb-2">สำเร็จ!</h3>
        <p id="successModalMsg" class="text-gray-600 mb-6 text-sm">ทำรายการเรียบร้อยแล้ว</p>
        <button onclick="closeModal('successModalOverlay')" class="w-full bg-brand text-white font-bold py-2.5 px-4 rounded-xl hover:bg-brand-dark transition-colors shadow-md">
            ตกลง
        </button>
    </div>
</div>

<div id="deleteModalOverlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[60] hidden flex items-center justify-center p-4 transition-opacity duration-300">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden transform transition-all text-center p-8 border-t-4 border-red-500">
        <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner">
            <i class="fas fa-exclamation-triangle text-3xl text-red-500"></i>
        </div>
        <h3 class="text-xl font-bold text-gray-800 mb-2">ยืนยันการลบ</h3>
        <p class="text-gray-600 mb-6 text-sm">คุณแน่ใจหรือไม่ว่าต้องการลบรายการนี้? ข้อมูลจะไม่สามารถกู้คืนได้</p>
        <div class="flex gap-3">
            <button onclick="closeModal('deleteModalOverlay')" class="flex-1 bg-gray-200 text-gray-700 font-bold py-2.5 px-4 rounded-xl hover:bg-gray-300 transition-colors">
                ยกเลิก
            </button>
            <button id="confirmDeleteBtn" class="flex-1 bg-red-500 text-white font-bold py-2.5 px-4 rounded-xl hover:bg-red-600 transition-colors shadow-md">
                ยืนยันลบ
            </button>
        </div>
    </div>
</div>

<div id="editModalOverlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[60] hidden flex items-center justify-center p-4 transition-opacity duration-300">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all p-6 border-t-4 border-blue-500">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-bold text-gray-800"><i class="fas fa-edit text-blue-500 mr-2"></i> แก้ไขรายการสินค้า</h3>
            <button onclick="closeModal('editModalOverlay')" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times text-xl"></i></button>
        </div>
        <input type="hidden" id="editOrderNum">
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">เลข Tracking ของจีน</label>
                <input type="text" id="editTrackingInput" class="w-full border border-gray-300 rounded-md p-2 text-sm outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">รายละเอียดสินค้า</label>
                <input type="text" id="editDetailInput" class="w-full border border-gray-300 rounded-md p-2 text-sm outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
            </div>
        </div>
        <div class="mt-6 flex gap-3">
            <button onclick="closeModal('editModalOverlay')" class="flex-1 border border-gray-300 text-gray-700 font-bold py-2 px-4 rounded-xl hover:bg-gray-50 transition-colors">
                ยกเลิก
            </button>
            <button onclick="submitEdit()" class="flex-1 bg-blue-600 text-white font-bold py-2 px-4 rounded-xl hover:bg-blue-700 transition-colors shadow-md">
                บันทึกการแก้ไข
            </button>
        </div>
    </div>
</div>
