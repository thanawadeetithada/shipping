    <script>
        function switchPage(pageId) {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('registerSection').classList.add('hidden');
            document.getElementById('errorMsg').classList.add('hidden');
            document.getElementById('statusMsg').classList.add('hidden');        
            document.getElementById('loginForm').reset();
            document.getElementById('registerForm').reset();
            document.getElementById(pageId).classList.remove('hidden');          
            document.title = pageId === 'loginSection' ? "เข้าสู่ระบบ - SUCHAR CARGO" : "สมัครสมาชิก - SUCHAR CARGO";
        }

        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);

            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            const phone = document.getElementById('phone_login').value;
            const password = document.getElementById('password_login').value;
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');

            // 1. เรียกใช้งาน Spinner โหลดเต็มหน้าจอ
            const loadingOverlay = document.getElementById('loadingOverlay');
            const loadingText = document.getElementById('loadingText');
            const loadingIcon = document.getElementById('loadingIcon');

            // 2. ปิดปุ่มเข้าสู่ระบบไม่ให้กดซ้ำ (แต่ไม่เปลี่ยนสี ไม่เปลี่ยนข้อความปุ่ม)
            btn.disabled = true;
            errorMsg.classList.add('hidden');

            // 3. แสดง Spinner เต็มหน้าจอ
            loadingOverlay.classList.remove('hidden');
            loadingIcon.className = "fas fa-circle-notch fa-spin text-6xl mb-4";
            loadingText.innerText = "กำลังตรวจสอบข้อมูล...";

            google.script.run
                .withSuccessHandler(function(response) {
                    if(response.success) {
                        // บันทึก Session
                        sessionStorage.setItem("userSession", JSON.stringify(response.user));

                        // เปลี่ยนไปหน้า main ทันที (ปล่อยให้ Spinner หมุนค้างไว้ระหว่างโหลดหน้าใหม่ จะได้ดูสมูท)
                        <? var url = getScriptUrl(); ?>
                        window.top.location.href = "<?= url ?>?page=main"; 
                    } else {
                        // ถ้าล็อกอินผิด ปิด Spinner, เปิดปุ่มให้กดใหม่ และโชว์ Error
                        loadingOverlay.classList.add('hidden');
                        btn.disabled = false;
                        errorMsg.classList.remove('hidden');
                        errorMsg.innerText = response.message;
                    }
                })
                .withFailureHandler(function(error) {
                    // กรณีเซิร์ฟเวอร์พัง ปิด Spinner และโชว์ข้อความ
                    loadingOverlay.classList.add('hidden');
                    btn.disabled = false;
                    errorMsg.classList.remove('hidden');
                    errorMsg.innerText = "ไม่สามารถติดต่อเซิร์ฟเวอร์ได้";
                })
                .verifyLogin(phone, password);
        }

        function handleRegister(e) {
            e.preventDefault();
            const password = document.getElementById('password_reg').value;
            const confirmPassword = document.getElementById('confirm_password_reg').value;
            const statusMsg = document.getElementById('statusMsg');
            
            const loadingOverlay = document.getElementById('loadingOverlay');
            const loadingText = document.getElementById('loadingText');
            const loadingIcon = document.getElementById('loadingIcon');

            if (password !== confirmPassword) {
                statusMsg.classList.remove('hidden', 'text-green-600');
                statusMsg.classList.add('block', 'text-red-500');
                statusMsg.innerText = "รหัสผ่านไม่ตรงกัน";
                return;
            }

            const data = {
                fullname: document.getElementById('fullname_reg').value,
                phone: document.getElementById('phone_reg').value,
                password: password,
                address: document.getElementById('address_reg').value
            };

            statusMsg.classList.add('hidden');
            loadingOverlay.classList.remove('hidden');
            loadingIcon.className = "fas fa-circle-notch fa-spin text-6xl mb-4"; 
            loadingText.innerText = "กำลังบันทึกข้อมูล...";

            google.script.run
                .withSuccessHandler(function (response) {
                    if (response.success) {
                        loadingIcon.className = "fas fa-check-circle text-green-400 text-6xl mb-4";
                        loadingText.innerText = "สมัครสมาชิกสำเร็จ!";

                        setTimeout(() => {
                            loadingOverlay.classList.add('hidden');
                            switchPage('loginSection');
                        }, 1000);

                    } else {
                        loadingOverlay.classList.add('hidden');
                        statusMsg.classList.remove('hidden', 'text-green-600');
                        statusMsg.classList.add('block', 'text-red-500');
                        statusMsg.innerText = response.message;
                    }
                })
                .registerNewUser(data);
        }
    </script>
